[pytest]
norecursedirs = data .tox _plugin_template .idea node_modules ~*
junit_family=legacy
pythonpath=src
testpaths=tests
tmp_path_retention_policy=all
tmp_path_retention_count=0
addopts =
        --tb=short
        --capture=sys
        --cov src
        --cov-config=tests/.coveragerc
        --cov-report html
        --cov-report xml

python_files=test_*.py
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

asyncio_mode = auto
