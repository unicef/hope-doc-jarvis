site_name: HOPE Bot Documentation
site_url: https://unicef.github.io/hope-bot/
repo_url: https://github.com/unicef/hope-bot

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Commands:
      - Overview: commands/index.md
      - jarvis update: commands/update.md
      - jarvis db: commands/db.md
      - jarvis check: commands/check.md
  - Webhook: webhook.md
  - Architecture: architecture.md
  - Configuration: configuration.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - tables
