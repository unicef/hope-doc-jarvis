[tox]
requires =
    tox>=4.2
    tox-uv>=1.25
env_list =
    lint
    tests
    mypy
    pkg_meta

[testenv:lint]
description = run static analysis and style check using ruff
skip_install = true
deps =
    pre-commit-uv>=4.1.1
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:tests]
runner = uv-venv-lock-runner
commands =
    pytest tests/

[testenv:mypy]
runner = uv-venv-lock-runner
description = run mypy type checking
skip_install = false
commands =
    mypy --config-file mypy.ini {posargs:}
dependency_groups = mypy
uv_sync_flags = --no-editable

[testenv:pkg_meta]
runner = uv-venv-lock-runner
description = check that python package
skip_install = true
deps =
    check-wheel-contents>=0.6
    twine>=5.1.1
    uv>=0.5
commands =
    uv build --sdist -q --out-dir {env_tmp_dir} .
    uvx twine check {env_tmp_dir}{/}*
    uvx check-wheel-contents --ignore W002,W004,W009,W004 {env_tmp_dir}

[testenv:format]
description = run static analysis and style check using ruff
skip_install = true
commands =
    ruff format src/
    ruff format tests/
    ruff format --check src/
dependency_groups = dev
