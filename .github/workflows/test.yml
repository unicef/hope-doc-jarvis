---
name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [ synchronize, opened, reopened, ready_for_review ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  attestations: write
  actions: write


jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    defaults:
      run:
        shell: bash
    outputs:
      run_tests: ${{ steps.changes.outputs.run_tests }}
      dockerize: ${{ steps.changes.outputs.dockerize }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - id: changes
      name: Check for file changes
      uses: dorny/paths-filter@v4
      with:
        base: ${{ github.ref }}
        token: ${{ github.token }}
        filters: .github/file-filters.yml

  test:
    needs: [changes]
    if: needs.changes.outputs.run_tests == 'true'
    outputs:
      commit: ${{ steps.build.outputs.commit }}
    runs-on: ubuntu-latest
    env:
      DOCKER_DEFAULT_PLATFORM: linux/amd64
      DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      DATABASE_URL: postgres://postgres:postgres@localhost:15432/test
      CACHE_URL: redis://localhost:16379/0
      DRAMATIQ_BROKER: redis://localhost:16379/0
      DOCKER_BUILDKIT: 1
      RUNNER_TOOL_CACHE: /tmp/
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v8.0.0
      with:
        version: latest
        enable-cache: true
        prune-cache: false
        cache-local-path: ./uv-cache
        cache-dependency-glob: |
          **/pyproject.toml
          **/uv.lock
        python-version: 3.13.1
        activate-environment: true

    - name: Restore cached vEnv
      id: cache-venv-restore
      uses: actions/cache/restore@v5
      with:
        path: |
          ./uv-cache
          ./tox
        key: ${{ runner.os }}-venv-3.13

    - name: Install dependencies
      run: uv sync --cache-dir ./uv-cache --frozen

    - name: Save vEnv
      id: cache-venv-save
      uses: actions/cache/save@v5
      with:
        path: |
          ./uv-cache
          ./tox
        key: ${{ steps.cache-venv-restore.outputs.cache-primary-key }}

    - name: Run Test suite
      run: |
        uv run tox -e tests
