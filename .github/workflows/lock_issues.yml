name: 'lock closed issues/PRs'
on:
  schedule:
    - cron: '* */12 * * *'
  workflow_dispatch:
jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7 # v6.0.0
        with:
          github-token: ${{ github.token }}
          issue-inactive-days: 15
          issue-lock-reason: ''
          pr-inactive-days: 15
          pr-lock-reason: ''
